name: MinikRutin
options:
  minimumXcodeGenVersion: "2.41.0"
  bundleIdPrefix: com.iclibera
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: tr

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: 1
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: UW47H2W9TW
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO

targets:
  MinikRutin:
    type: application
    platform: iOS
    sources:
      - path: MinikRutin/Sources
      - path: MinikRutin/Resources
        buildPhase: resources
    info:
      path: MinikRutin/Info.plist
      properties:
        CFBundleDisplayName: MinikRutin
        CFBundleName: MinikRutin
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleDevelopmentRegion: tr
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIUserInterfaceStyle: Automatic
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.iclibera.minikrutin
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_KEY_UILaunchScreen_Generation: NO

  MinikRutinTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: MinikRutin/Tests
    dependencies:
      - target: MinikRutin
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES

schemes:
  MinikRutin:
    build:
      targets:
        MinikRutin: all
    run:
      storeKitConfiguration: MinikRutin/Resources/MinikRutin.storekit
    test:
      targets:
        - MinikRutinTests
